<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tradición Memory Match</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="intro-overlay" class="overlay">
    <img src="img/back-face.png" id="intro-logo" alt="Salsa Guy Richmond Logo">
    <div class="intro-box">
      <h1 class="welcome-title">Tradición Memory Match</h1>
      <p class="welcome-p">Get ready to match the dancers!</p>
      
      <div id="countdown-display">
        <span id="count-num">6</span>
      </div>

      <div class="audio-settings-container">
        <button id="audio-settings-btn" class="btn-audio">Audio Setting</button>
      </div>
      
      <button id="start-btn" class="btn-orange" style="margin-top: 25px;">START GAME</button>
    </div>
  </div>

  <header class="game-header">
    <h1>Tradición Memory Match</h1>
    <div class="stats-container">
      <div class="stat-item">Time: <span id="time">00:00</span></div>
      <div class="stat-item">Moves: <span id="moves">0</span></div>
      <div class="stat-item">Score: <span id="score">1000</span></div>
    </div>
  </header>

  <main class="memory-game" id="game-board">
    </main>

  <script src="script.js"></script>
</body>
</html>
