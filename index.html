<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tradición Memory Match</title>
  
  <style>
    /* 1. Reset and Body Styles */
    * { padding: 0; margin: 0; box-sizing: border-box; }
    body { min-height: 100vh; display: flex; flex-direction: column; background-color: #2c7a9b; font-family: sans-serif; color: white; }

    /* 2. Loading Screen */
    #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2c7a9b; display: flex; justify-content: center; align-items: center; z-index: 100; transition: opacity 0.5s ease-out; }
    .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.3); border-top: 5px solid white; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* 3. Game Header and Stats */
    .game-header { text-align: center; padding: 15px; background: rgba(0, 0, 0, 0.2); }
    .stats-container { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
    button { padding: 6px 12px; background: #f39c12; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

    /* 4. Memory Game Grid (4 rows, 6 columns for 24 cards) */
    .memory-game { width: 95vw; max-width: 800px; height: 70vh; margin: 20px auto; display: flex; flex-wrap: wrap; perspective: 1000px; }
    
    /* 5. Memory Card (Includes aspect-ratio: contain for character scaling) */
    .memory-card { width: calc(16.66% - 10px); height: calc(25% - 10px); margin: 5px; position: relative; transform-style: preserve-3d; transition: transform .5s; cursor: pointer; border-radius: 6px; overflow: hidden; }
    .memory-card:active { transform: scale(0.97); transition: transform .2s; }
    .memory-card.flip { transform: rotateY(180deg); }

    /* 6. Card Faces (Character Containment Fix) */
    .front-face, .back-face { width: 100%; height: 100%; position: absolute; border-radius: 6px; backface-visibility: hidden; background-color: white; }
    
    /* THE CONTAINMENT FIX FOR CHARACTER IMAGES: Set object-fit to contain and object-position to center */
    .front-face { transform: rotateY(180deg); object-fit: contain !important; object-position: center !important; padding: 5px !important; }

    /* THE STRETCH FIX FOR CARD BACKS */
    .back-face { object-fit: cover !important; }

    /* 7. Overlay Messages */
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
    .message-content { background: white; color: #333; padding: 30px; border-radius: 10px; text-align: center; }
  </style>
</head>
<body>

  <div id="loading-screen"><div class="spinner"></div><h2>Preparing the Stage...</h2></div>

  <div class="game-header">
    <h1>Memory Match</h1>
    <div class="stats-container">
      <span>Time: <b id="timer">00:00</b></span>
      <span>Moves: <b id="move-counter">0</b></span>
      <button onclick="resetGame()">Reset</button>
    </div>
  </div>

  <section class="memory-game">
    <div class="memory-card" data-framework="bomba"><img class="front-face" src="img/bomba.png"><img class="back-face" src="img/card-back.png"></div>
    <div class="memory-card" data-framework="bomba"><img class="front-face" src="img/bomba.png"><img class="back-face" src="img/card-back.png"></div>
    
    <div class="memory-card" data-framework="azul"><img class="front-face" src="img/Azul Transparent.png"><img class="back-face" src="img/card-back.png"></div>
    <div class="memory-card" data-framework="azul"><img class="front-face" src="img/Azul Transparent.png"><img class="back-face" src="img/card-back.png"></div>

    <div class="memory-card" data-framework="musician"><img class="front-face" src="img/bomba-musician.png"><img class="back-face" src="img/card-back.png"></div>
    <div class="memory-card" data-framework="musician"><img class="front-face" src="img/bomba-musician.png"><img class="back-face" src="img/card-back.png"></div>

    <div class="memory-card" data-framework="edna"><img class="front-face" src="img/cabezudos-edna-gabriel.png"><img class="back-face" src="img/card-back.png"></div>
    <div class="memory-card" data-framework="edna"><img class="front-face" src="img/cabezudos-edna-gabriel.png"><img class="back-face" src="img/card-back.png"></div>

    <div class="memory-card" data-framework="cano"><img class="front-face" src="img/cano-barracuda.png"><img class="back-face" src="img/card-back.png"></div>
    <div class="memory-card" data-framework="cano"><img class="front-face" src="img/cano-barracuda.png"><img class="back-face" src="img/card-back.png"></div>

    <div class="memory-card" data-framework="comalera"><img class="front-face" src="img/comalera.png"><img class="back-face" src="img/card-back.png"></div>
    <div class="memory-card" data-framework="comalera"><img class="front-face" src="img/comalera.png"><img class="back-face" src="img/card-back.png"></div>

    <div class="memory-card" data-framework="mapale"><img class="front-face" src="img/mapale.png"><img class="back-face" src="img/card-back.png"></div>
    <div class="memory-card" data-framework="mapale"><img class="front-face" src="img/mapale.png"><img class="back-face" src="img/card-back.png"></div>

    <div class="memory-card" data-framework="viejito"><img class="front-face" src="img/viejito.png"><img class="back-face" src="img/card-back.png"></div>
    <div class="memory-card" data-framework="viejito"><img class="front-face" src="img/viejito.png"><img class="back-face" src="img/card-back.png"></div>

    <div class="memory-card" data-framework="salsaguy"><img class="front-face" src="img/salsa-guy.png"><img class="back-face" src="img/card-back.png"></div>
    <div class="memory-card" data-framework="salsaguy"><img class="front-face" src="img/salsa-guy.png"><img class="back-face" src="img/card-back.png"></div>

    <div class="memory-card" data-framework="mex"><img class="front-face" src="img/mex.png"><img class="back-face" src="img/card-back.png"></div>
    <div class="memory-card" data-framework="mex"><img class="front-face" src="img/mex.png"><img class="back-face" src="img/card-back.png"></div>

    <div class="memory-card" data-framework="tango"><img class="front-face" src="img/tango.png"><img class="back-face" src="img/card-back.png"></div>
    <div class="memory-card" data-framework="tango"><img class="front-face" src="img/tango.png"><img class="back-face" src="img/card-back.png"></div>

    <div class="memory-card" data-framework="barril"><img class="front-face" src="img/barril.png"><img class="back-face" src="img/card-back.png"></div>
    <div class="memory-card" data-framework="barril"><img class="front-face" src="img/barril.png"><img class="back-face" src="img/card-back.png"></div>
  </section>

  <div id="win-message" class="overlay"><div class="message-content"><h2>¡Felicidades!</h2><p id="final-stats"></p><button onclick="resetGame()">Play Again</button></div></div>

  <audio id="sound-flip" src="flip.mp3"></audio>
  <audio id="sound-match" src="match.mp3"></audio>
  <audio id="sound-mismatch" src="mismatch.mp3"></audio>

  <script>
    const cards = document.querySelectorAll('.memory-card');
    const winMessage = document.getElementById('win-message');
    const moveCounter = document.getElementById('move-counter');
    const timerDisplay = document.getElementById('timer');
    const winStats = document.getElementById('final-stats');

    let hasFlippedCard = false;
    let lockBoard = false;
    let firstCard, secondCard;
    let moves = 0;
    let matchedPairs = 0;
    let timerStarted = false;
    let seconds = 0;
    let timerInterval;

    function flipCard() {
      if (lockBoard || this === firstCard) return;
      if (!timerStarted) { startTimer(); timerStarted = true; }
      playSFX('sound-flip');
      this.classList.add('flip');

      if (!hasFlippedCard) {
        hasFlippedCard = true;
        firstCard = this;
        return;
      }
      secondCard = this;
      checkForMatch();
    }

    function checkForMatch() {
      let isMatch = firstCard.dataset.framework === secondCard.dataset.framework;
      isMatch ? disableCards() : unflipCards();
      moves++;
      moveCounter.innerText = moves;
    }

    function disableCards() {
      setTimeout(() => playSFX('sound-match'), 300);
      firstCard.removeEventListener('click', flipCard);
      secondCard.removeEventListener('click', flipCard);
      matchedPairs++;
      if (matchedPairs === 12) { clearInterval(timerInterval); showWinMessage(); }
      resetBoard();
    }

    function unflipCards() {
      lockBoard = true;
      setTimeout(() => {
        playSFX('sound-mismatch');
        firstCard.classList.remove('flip');
        secondCard.classList.remove('flip');
        resetBoard();
      }, 1000);
    }

    function resetBoard() { [hasFlippedCard, lockBoard] = [false, false]; [firstCard, secondCard] = [null, null]; }

    function startTimer() { timerInterval = setInterval(() => { seconds++; timerDisplay.innerText = formatTime(seconds); }, 1000); }

    function formatTime(s) { let mins = Math.floor(s/60); let secs = s%60; return `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`; }

    function showWinMessage() { winStats.innerText = `Matched in ${moves} moves and ${formatTime(seconds)}!`; winMessage.style.display = 'flex'; }

    function shuffle() { cards.forEach(card => card.style.order = Math.floor(Math.random() * 24)); }

    function resetGame() { clearInterval(timerInterval); seconds=0; moves=0; matchedPairs=0; timerStarted=false; timerDisplay.innerText="00:00"; moveCounter.innerText="0"; winMessage.style.display='none'; shuffle(); cards.forEach(card => card.classList.remove('flip')); cards.forEach(card => card.addEventListener('click', flipCard)); resetBoard(); }

    function playSFX(id) { const sfx = document.getElementById(id); if (sfx) { sfx.currentTime = 0; sfx.play(); } }

    window.addEventListener('load', () => { setTimeout(() => document.getElementById('loading-screen').style.opacity = '0', 1000); setTimeout(() => document.getElementById('loading-screen').style.display='none', 1500); });

    shuffle();
    cards.forEach(card => card.addEventListener('click', flipCard));
  </script>
</body>
</html>
