<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tradición Memory Match</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="loading-screen">
    <div class="loader-content">
      <img src="logo.png" alt="Logo" class="loader-logo">
      <div class="spinner"></div>
      <h2>Preparing the Stage...</h2>
    </div>
  </div>

  <div class="game-header">
    <h1>Tradición Memory Match</h1>
    <div class="stats-container">
      <span>Time: <b id="timer">00:00</b></span>
      <span style="margin-left: 20px;">Moves: <b id="move-counter">0</b></span>
    </div>
  </div>

  <section class="memory-game">
    <div class="memory-card" data-framework="bomba"><img class="front-face" src="bomba.png"><div class="back-face"></div></div>
    <div class="memory-card" data-framework="bomba"><img class="front-face" src="bomba.png"><div class="back-face"></div></div>
    <div class="memory-card" data-framework="azul"><img class="front-face" src="Azul Transparent.png"><div class="back-face"></div></div>
    <div class="memory-card" data-framework="azul"><img class="front-face" src="Azul Transparent.png"><div class="back-face"></div></div>
    <div class="memory-card" data-framework="musician"><img class="front-face" src="bomba-musician.png"><div class="back-face"></div></div>
    <div class="memory-card" data-framework="musician"><img class="front-face" src="bomba-musician.png"><div class="back-face"></div></div>
    <div class="memory-card" data-framework="edna"><img class="front-face" src="cabezudos-edna-gabriel.png"><div class="back-face"></div></div>
    <div class="memory-card" data-framework="edna"><img class="front-face" src="cabezudos-edna-gabriel.png"><div class="back-face"></div></div>
    <div class="memory-card" data-framework="cano"><img class="front-face" src="cano-barracuda.png"><div class="back-face"></div></div>
    <div class="memory-card" data-framework="cano"><img class="front-face" src="cano-barracuda.png"><div class="back-face"></div></div>
    <div class="memory-card" data-framework="comalera"><img class="front-face" src="comalera.png"><div class="back-face"></div></div>
    <div class="memory-card" data-framework="comalera"><img class="front-face" src="comalera.png"><div class="back-face"></div></div>
    <div class="memory-card" data-framework="mapale"><img class="front-face" src="mapale.png"><div class="back-face"></div></div>
    <div class="memory-card" data-framework="mapale"><img class="front-face" src="mapale.png"><div class="back-face"></div></div>
    <div class="memory-card" data-framework="viejito"><img class="front-face" src="viejito.png"><div class="back-face"></div></div>
    <div class="memory-card" data-framework="viejito"><img class="front-face" src="viejito.png"><div class="back-face"></div></div>
    <div class="memory-card" data-framework="salsaguy"><img class="front-face" src="salsa-guy.png"><div class="back-face"></div></div>
    <div class="memory-card" data-framework="salsaguy"><img class="front-face" src="salsa-guy.png"><div class="back-face"></div></div>
    <div class="memory-card" data-framework="mex"><img class="front-face" src="mex.png"><div class="back-face"></div></div>
    <div class="memory-card" data-framework="mex"><img class="front-face" src="mex.png"><div class="back-face"></div></div>
    <div class="memory-card" data-framework="tango"><img class="front-face" src="tango.png"><div class="back-face"></div></div>
    <div class="memory-card" data-framework="tango"><img class="front-face" src="tango.png"><div class="back-face"></div></div>
    <div class="memory-card" data-framework="barril"><img class="front-face" src="barril.png"><div class="back-face"></div></div>
    <div class="memory-card" data-framework="barril"><img class="front-face" src="barril.png"><div class="back-face"></div></div>
  </section>

  <div id="win-message" class="overlay">
    <div class="message-content">
      <h2>¡Felicidades!</h2>
      <p id="final-stats"></p>
      <button onclick="location.reload()">Play Again</button>
    </div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
