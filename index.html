<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tradición Memory Match</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="game-header">
    <h1>Tradición Memory Match</h1>
    <div class="stats-container">
      <span>Time: <b id="timer">00:00</b></span>
      <span>Moves: <b id="move-counter">0</b></span>
      <button class="btn-orange" onclick="toggleSettings()">Audio Settings</button>
      <button class="btn-orange" onclick="resetGame()">Reset Game</button>
    </div>
  </div>

  <div id="audio-settings" class="overlay" style="display: none;">
    <div class="message-content">
      <h3>Volume Control</h3>
      <input type="range" id="bg-volume" min="0" max="1" step="0.1" value="0.3" oninput="updateVolume()">
      <br><br>
      <button class="btn-orange" onclick="toggleSettings()">Close</button>
    </div>
  </div>

  <section class="memory-game" id="game-board">
    <div class="memory-card" data-framework="bomba">
      <img class="front-face" src="img/bomba.png" alt="Bomba">
      <div class="back-face"><img src="img/logo.png" alt="Tradición"></div>
    </div>
    <div class="memory-card" data-framework="bomba">
      <img class="front-face" src="img/bomba.png" alt="Bomba">
      <div class="back-face"><img src="img/logo.png" alt="Tradición"></div>
    </div>

    <div class="memory-card" data-framework="azul">
      <img class="front-face" src="img/Azul Transparent.png" alt="Azul">
      <div class="back-face"><img src="img/logo.png" alt="Tradición"></div>
    </div>
    <div class="memory-card" data-framework="azul">
      <img class="front-face" src="img/Azul Transparent.png" alt="Azul">
      <div class="back-face"><img src="img/logo.png" alt="Tradición"></div>
    </div>

    <div class="memory-card" data-framework="musician">
      <img class="front-face" src="img/bomba-musician.png" alt="Musician">
      <div class="back-face"><img src="img/logo.png" alt="Tradición"></div>
    </div>
    <div class="memory-card" data-framework="musician">
      <img class="front-face" src="img/bomba-musician.png" alt="Musician">
      <div class="back-face"><img src="img/logo.png" alt="Tradición"></div>
    </div>

    <div class="memory-card" data-framework="edna">
      <img class="front-face" src="img/cabezudos-edna-gabriel.png" alt="Edna">
      <div class="back-face"><img src="img/logo.png" alt="Tradición"></div>
    </div>
    <div class="memory-card" data-framework="edna">
      <img class="front-face" src="img/cabezudos-edna-gabriel.png" alt="Edna">
      <div class="back-face"><img src="img/logo.png" alt="Tradición"></div>
    </div>

    <div class="memory-card" data-framework="cano">
      <img class="front-face" src="img/cano-barracuda.png" alt="Cano">
      <div class="back-face"><img src="img/logo.png" alt="Tradición"></div>
    </div>
    <div class="memory-card" data-framework="cano">
      <img class="front-face" src="img/cano-barracuda.png" alt="Cano">
      <div class="back-face"><img src="img/logo.png" alt="Tradición"></div>
    </div>

    <div class="memory-card" data-framework="comalera">
      <img class="front-face" src="img/comalera.png" alt="Comalera">
      <div class="back-face"><img src="img/logo.png" alt="Tradición"></div>
    </div>
    <div class="memory-card" data-framework="comalera">
      <img class="front-face" src="img/comalera.png" alt="Comalera">
      <div class="back-face"><img src="img/logo.png" alt="Tradición"></div>
    </div>

    <div class="memory-card" data-framework="mapale">
      <img class="front-face" src="img/mapale.png" alt="Mapale">
      <div class="back-face"><img src="img/logo.png" alt="Tradición"></div>

      <div class="back-face"><img src="img/logo.png" alt="Tradición"></div>

    <div class="memory-card" data-framework="barril">
      <img class="front-face" src="img/barril.png" alt="Barril">
      <div class="back-face"><img src="img/logo.png" alt="Tradición"></div>
    </div>
    <div class="memory-card" data-framework="barril">
      <img class="front-face" src="img/barril.png" alt="Barril">
      <div class="back-face"><img src="img/logo.png" alt="Tradición"></div>
    </div>
  </section>

  <div id="win-message" class="overlay" style="display: none;">
    <div class="message-content">
      <h2>¡Felicidades!</h2>
      <p id="final-stats"></p>
      <button class="btn-orange" onclick="resetGame()">Play Again</button>
    </div>
  </div>

  <audio id="bg-music" src="audio/bg-music.mp3" loop></audio>
  <audio id="sound-flip" src="audio/flip.mp3"></audio>
  <audio id="sound-match" src="audio/match.mp3"></audio>
  <audio id="sound-mismatch" src="audio/mismatch.mp3"></audio>

  <script src="scripts.js"></script>
</body>
</html>
