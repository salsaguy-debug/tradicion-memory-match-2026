<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tradición Memory Match</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="game-header">
    <h1>Memory Match</h1>
    <div class="stats-container">
      <span>Time: <b id="timer">00:00</b></span>
      <span>Moves: <b id="move-counter">0</b></span>
      <button onclick="toggleSettings()">Audio</button>
      <button onclick="resetGame()">Reset</button>
    </div>
  </div>

  <div id="audio-settings" class="settings-panel">
    <h3>Volume</h3>
    <input type="range" id="bg-volume" min="0" max="1" step="0.1" value="0.3" oninput="updateVolume()">
    <button onclick="toggleSettings()">Close</button>
  </div>

  <section class="memory-game">
    <div class="memory-card" data-framework="bomba"><img class="front-face" src="img/bomba.png"><div class="back-face"></div></div>
    <div class="memory-card" data-framework="bomba"><img class="front-face" src="img/bomba.png"><div class="back-face"></div></div>
    </section>

  <audio id="bg-music" src="bg-music.mp3" loop></audio>
  <audio id="sound-flip" src="flip.mp3"></audio>
  <audio id="sound-match" src="match.mp3"></audio>
  <audio id="sound-mismatch" src="mismatch.mp3"></audio>

  <script src="scripts.js"></script>
</body>
</html>
